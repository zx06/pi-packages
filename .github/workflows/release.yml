name: Release

on:
  push:
    tags:
      - '*-v*'

jobs:
  publish-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify tag commit is on main
        run: |
          git fetch origin main --depth=1
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'; then
            echo "Release tags must point to a commit on main"
            exit 1
          fi

      - name: Resolve package from tag
        id: resolve
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const refName = process.env.REF_NAME || '';
          const outputFile = process.env.GITHUB_OUTPUT;

          const packagesDir = path.join(process.cwd(), 'packages');
          const packageDirs = fs.existsSync(packagesDir)
            ? fs.readdirSync(packagesDir, { withFileTypes: true }).filter((entry) => entry.isDirectory())
            : [];

          const packages = packageDirs
            .map((entry) => {
              const dir = path.join('packages', entry.name);
              const packageJsonPath = path.join(dir, 'package.json');
              if (!fs.existsSync(packageJsonPath)) return null;
              const pkg = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
              return {
                name: pkg.name,
                version: pkg.version,
                dir,
              };
            })
            .filter(Boolean);

          const fail = (message) => {
            console.error(message);
            process.exit(1);
          };

          if (packages.length === 0) {
            fail('No workspace packages found under packages/*');
          }

          const match = refName.match(/^(.*)-v(\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)$/);
          if (!match) {
            fail(`Tag ${refName} does not match <package-name>-v<version>`);
          }

          const packageName = match[1];
          const expectedVersion = match[2];
          const target = packages.find((pkg) => pkg.name === packageName);
          if (!target) {
            fail(`Package ${packageName} not found in workspaces`);
          }

          if (target.version !== expectedVersion) {
            fail(`Tag version ${expectedVersion} does not match ${target.dir}/package.json version ${target.version}`);
          }

          fs.appendFileSync(outputFile, `package-name=${target.name}\n`);
          fs.appendFileSync(outputFile, `package-dir=${target.dir}\n`);
          fs.appendFileSync(outputFile, `package-version=${target.version}\n`);

          console.log(`package name: ${target.name}`);
          console.log(`package dir: ${target.dir}`);
          console.log(`package version: ${target.version}`);
          NODE

      - name: Pack package
        id: pack
        run: |
          TARBALL=$(npm pack --workspace "${{ steps.resolve.outputs.package-name }}" | tail -n 1)
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "tarball path: ${TARBALL}"

      - name: Publish package to npm
        run: npm publish --workspace "${{ steps.resolve.outputs.package-name }}" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          PACKAGE_NAME: ${{ steps.resolve.outputs.package-name }}
          PACKAGE_VERSION: ${{ steps.resolve.outputs.package-version }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          gh release create "$TAG_NAME" \
            "$TARBALL" \
            --title "$PACKAGE_NAME v$PACKAGE_VERSION" \
            --generate-notes
